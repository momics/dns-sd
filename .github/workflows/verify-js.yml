name: Verify (JS)

# Reusable workflow: fmt/lint/typecheck plus the full test matrix for the
# TypeScript packages, under BOTH Deno and Node.js. Called by:
#   - ci.yml       (on push / pull_request)
#   - publish.yml  (before publishing a tag, against the tag's SHA)
#
# Keeping these jobs in one reusable workflow guarantees a tagged release runs
# the exact same checks as CI, so a red build can never be published.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Formatting, linting and typecheck — under Deno ───────────────────────────
  verify:
    name: Verify (fmt · lint · typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: deno fmt --check
        run: deno fmt --check

      - name: deno lint
        run: deno lint

      - name: deno check (typecheck source + tests)
        run: |
          deno task check
          deno task check:deno-runtime

  # ── Test suite under Deno ────────────────────────────────────────────────────
  test-deno:
    name: Test (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run shared tests + conformance suite under Deno
        run: deno task test

  # ── Test suite under Node.js (build with tsc, then run compiled output) ──────
  test-node:
    name: Test (Node.js · shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Typecheck under tsc
        run: npm run typecheck
      - name: Run shared tests + conformance suite under Node
        run: npm run test:node --workspace @momics/dns-sd-shared

  # ── Node.js runtime package (@momics/dns-sd-node) ────────────────────────────
  test-node-runtime:
    name: Test (Node.js · dns-sd-node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      # Build the shared package first so the Node adapter can consume it.
      - name: Build @momics/dns-sd-shared
        run: npm run build --workspace @momics/dns-sd-shared
      - name: Typecheck @momics/dns-sd-node
        run: npm run typecheck --workspace @momics/dns-sd-node
      # Transport unit tests always run. The real-network conformance suite is
      # gated behind DNS_SD_NETWORK_TESTS and skipped here, since GitHub-hosted
      # runners don't provide a working multicast loopback path.
      - name: Run @momics/dns-sd-node transport tests
        run: npm run test:node --workspace @momics/dns-sd-node

  # ── @momics/dns-sd-deno transport tests (Deno) ───────────────────────────────
  # Unit tests only: they use unicast loopback and never require multicast
  # routing, so they're safe on headless runners. The real-multicast conformance
  # suite is gated behind DNS_SD_NETWORK_TESTS=1 and is NOT run here.
  test-deno-runtime:
    name: Test (dns-sd-deno transport)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run dns-sd-deno unit tests under Deno
        run: deno task test:deno-runtime
