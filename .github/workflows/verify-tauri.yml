name: Verify (Tauri)

# Reusable workflow: builds the `@momics/dns-sd-tauri` Tauri plugin for desktop,
# runs its Rust tests, cross-compiles the mobile (iOS/Android) targets
# compile-only, and validates the guest-js binding. Called by:
#   - tauri.yml    (on push / pull_request touching the plugin)
#   - publish.yml  (before publishing a tag, against the tag's SHA)
#
# Mobile targets are built (never executed) to catch build regressions: Android
# is gating, iOS is informational (see the `mobile` job). Full mobile validation
# still happens via the example app on real toolchains.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Rust plugin: build (desktop) + unit/integration tests (loopback mDNS) ────
  rust:
    name: Rust plugin (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/dns-sd-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          # GitHub's Ubuntu runners ship a packages.microsoft.com apt source that
          # intermittently serves an invalid InRelease ("no longer signed"),
          # failing `apt-get update` with exit code 100. Drop it before updating.
          sudo rm -f /etc/apt/sources.list.d/*microsoft*.list
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libglib2.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dns-sd-tauri

      - name: cargo build (desktop)
        run: cargo build --verbose

      - name: cargo test (unit + loopback integration, network tests skipped)
        run: cargo test --verbose

  # ── Mobile (iOS/Android): compile-only cross-checks ──────────────────────────
  # Catch build regressions in the mobile code paths without running anything.
  # The plugin cross-compiles to a Rust rlib (no device, no execution).
  #
  #   Android (aarch64-linux-android) builds as a plain rlib on Linux and is
  #   GATING — a break fails CI.
  #   iOS (aarch64-apple-ios) pulls in swift-rs (it compiles a small Swift
  #   package via Xcode) which is environment-sensitive, so it is INFORMATIONAL
  #   (continue-on-error) — a break is surfaced but does not block.
  mobile:
    name: Mobile compile-check (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
            gating: true
          - target: aarch64-apple-ios
            os: macos-latest
            gating: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ !matrix.gating }}
    defaults:
      run:
        working-directory: packages/dns-sd-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dns-sd-tauri
          key: mobile-${{ matrix.target }}

      - name: cargo build --target ${{ matrix.target }} (compile-only, no execution)
        run: cargo build --target ${{ matrix.target }}

  # ── Guest-js: typecheck + build (Node/tsc) and check/test/fmt/lint (Deno) ────
  guest-js:
    name: Guest-js binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: npm ci

      - name: Build shared package (dependency)
        run: npm run build --workspace=@momics/dns-sd-shared

      - name: Typecheck guest-js (tsc)
        run: npm run typecheck --workspace=@momics/dns-sd-tauri

      - name: Build guest-js (tsc + esbuild global bundle)
        run: npm run build --workspace=@momics/dns-sd-tauri

      - name: deno check (guest-js + tests)
        run: deno task --cwd packages/dns-sd-tauri check

      - name: Test guest-js under Node (shared harness)
        run: npm run test:node --workspace=@momics/dns-sd-tauri

      - name: Test guest-js under Deno (shared harness)
        run: deno task --cwd packages/dns-sd-tauri test

      - name: deno fmt --check
        run: deno fmt --check

      - name: deno lint
        run: deno lint
