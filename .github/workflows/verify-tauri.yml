name: Verify (Tauri)

# Reusable workflow: builds the `@momics/dns-sd-tauri` Tauri plugin for desktop
# and validates the guest-js binding. Called by:
#   - tauri.yml    (on push / pull_request touching the plugin)
#   - publish.yml  (before publishing a tag, against the tag's SHA)
#
# Mobile (iOS/Android) sources are compile-ready but require Xcode / the Android
# SDK, so they are verified via the example app rather than here.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  # ── Rust plugin: build (desktop) + unit/integration tests (loopback mDNS) ────
  rust:
    name: Rust plugin (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/dns-sd-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libglib2.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/dns-sd-tauri

      - name: cargo build (desktop)
        run: cargo build --verbose

      - name: cargo test (unit + loopback integration, network tests skipped)
        run: cargo test --verbose

  # ── Guest-js: typecheck + build (Node/tsc) and check/test/fmt/lint (Deno) ────
  guest-js:
    name: Guest-js binding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: npm ci

      - name: Build shared package (dependency)
        run: npm run build --workspace=@momics/dns-sd-shared

      - name: Typecheck guest-js (tsc)
        run: npm run typecheck --workspace=@momics/dns-sd-tauri

      - name: Build guest-js (tsc + esbuild global bundle)
        run: npm run build --workspace=@momics/dns-sd-tauri

      - name: deno check (guest-js + tests)
        run: deno task --cwd packages/dns-sd-tauri check

      - name: deno test (guest-js unit tests)
        run: deno task --cwd packages/dns-sd-tauri test

      - name: deno fmt --check
        run: deno fmt --check

      - name: deno lint
        run: deno lint
