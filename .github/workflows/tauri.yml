name: Tauri plugin CI

# Builds the `@momics/dns-sd-tauri` Tauri plugin for desktop and validates the
# guest-js binding. Mobile (iOS/Android) sources are compile-ready but require
# Xcode / the Android SDK, so they are verified via the example app rather than
# here. No publishing steps.
#
# The actual jobs live in the reusable `verify-tauri.yml` workflow so that the
# publish workflow can run the identical checks against a release tag.

on:
  push:
    branches: [main]
    paths:
      - "packages/dns-sd-tauri/**"
      - "packages/dns-sd-shared/**"
      - ".github/workflows/tauri.yml"
      - ".github/workflows/verify-tauri.yml"
  pull_request:
    paths:
      - "packages/dns-sd-tauri/**"
      - "packages/dns-sd-shared/**"
      - ".github/workflows/tauri.yml"
      - ".github/workflows/verify-tauri.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tauri:
    name: Tauri
    uses: ./.github/workflows/verify-tauri.yml
