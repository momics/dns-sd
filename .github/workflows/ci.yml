name: CI

# Typecheck, lint, format-check and run the test suites under BOTH Deno and
# Node.js. The pure-TypeScript `@momics/dns-sd-shared` foundation proves it is
# runtime-neutral by passing the same suite under both runtimes; the
# `@momics/dns-sd-node` package adds a Node-only UDP-multicast transport and runs
# its transport unit tests here (the real-network conformance suite is gated
# behind DNS_SD_NETWORK_TESTS and runs locally). No Rust and no publishing steps.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".editorconfig"
      - ".gitignore"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Formatting, linting and typecheck — under Deno ───────────────────────────
  verify:
    name: Verify (fmt · lint · typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: deno fmt --check
        run: deno fmt --check

      - name: deno lint
        run: deno lint

      - name: deno check (typecheck source + tests)
        run: deno task check

  # ── Test suite under Deno ────────────────────────────────────────────────────
  test-deno:
    name: Test (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run shared tests + conformance suite under Deno
        run: deno task test

  # ── Test suite under Node.js (build with tsc, then run compiled output) ──────
  test-node:
    name: Test (Node.js · shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Typecheck under tsc
        run: npm run typecheck
      - name: Run shared tests + conformance suite under Node
        run: npm run test:node --workspace @momics/dns-sd-shared

  # ── Node.js runtime package (@momics/dns-sd-node) ────────────────────────────
  test-node-runtime:
    name: Test (Node.js · dns-sd-node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      # Build the shared package first so the Node adapter can consume it.
      - name: Build @momics/dns-sd-shared
        run: npm run build --workspace @momics/dns-sd-shared
      - name: Typecheck @momics/dns-sd-node
        run: npm run typecheck --workspace @momics/dns-sd-node
      # Transport unit tests always run. The real-network conformance suite is
      # gated behind DNS_SD_NETWORK_TESTS and skipped here, since GitHub-hosted
      # runners don't provide a working multicast loopback path.
      - name: Run @momics/dns-sd-node transport tests
        run: npm run test:node --workspace @momics/dns-sd-node
