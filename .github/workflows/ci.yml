name: CI

# Typecheck, lint, format-check and run the test suites under BOTH Deno and
# Node.js. The pure-TypeScript `@momics/dns-sd-shared` foundation proves it is
# runtime-neutral by passing the same suite under both runtimes; the
# `@momics/dns-sd-node` package adds a Node-only UDP-multicast transport and runs
# its transport unit tests here (the real-network conformance suite is gated
# behind DNS_SD_NETWORK_TESTS and runs locally). No Rust and no publishing steps.
#
# The actual jobs live in the reusable `verify-js.yml` workflow so that the
# publish workflow can run the identical checks against a release tag.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE*"
      - ".editorconfig"
      - ".gitignore"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS
    uses: ./.github/workflows/verify-js.yml
